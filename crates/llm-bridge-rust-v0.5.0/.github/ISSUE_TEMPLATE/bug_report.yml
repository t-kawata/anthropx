name: Bug report
description: Report a bug, regression, or incorrect behavior in llm-bridge
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please confirm the issue is reproducible on a recent revision and include the smallest useful reproduction.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect instead?
      placeholder: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide commands, inputs, fixture names, or request/response examples.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        git revision:
        rustc version:
        cargo version:
        OS:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste the most relevant output, stack trace, or failing fixture.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues first
          required: true
        - label: I can reproduce this on a recent version of llm-bridge
          required: false
