name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify agent sync
        if: runner.os == 'Linux'
        run: make check-agent-sync

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Run tests
        run: cargo nextest run --all-features

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic

      - name: Typos
        if: runner.os == 'Linux'
        uses: crate-ci/typos@master

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Dependency license & source audit
        run: cargo deny check

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Vulnerability audit
        run: cargo audit

      - name: Detect secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v1
        with:
          args: detect --source . --verbose

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Parse MSRV from Cargo.toml
        id: msrv
        run: |
          version=$(grep 'rust-version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${version:-stable}" >> $GITHUB_OUTPUT

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Check MSRV compatibility
        run: cargo check --workspace --all-targets --all-features
