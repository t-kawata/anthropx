fail_fast: false
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit, manual]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: fix-byte-order-marker
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format files with rustfmt.
        entry: bash -c 'cargo +nightly fmt -- --check'
        language: system
        files: \.rs$
        pass_filenames: false
      - id: cargo-deny
        name: cargo deny check
        description: Check cargo dependencies
        entry: bash -c 'cargo deny check -d'
        language: system
        files: \.rs$
        pass_filenames: false
      - id: cargo-audit
        name: cargo audit
        description: Check for known security vulnerabilities
        entry: bash -c 'cargo audit'
        language: system
        files: (Cargo\.lock|Cargo\.toml)$
        pass_filenames: false
      - id: typos
        name: typos
        description: check typo
        entry: bash -c 'typos'
        language: system
        files: \.*$
        pass_filenames: false
      - id: cargo-check
        name: cargo check
        description: Check the package for errors.
        entry: bash -c 'cargo check --all'
        language: system
        files: \.rs$
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        description: Lint rust sources
        entry: bash -c 'cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic'
        language: system
        files: \.rs$
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        description: unit test for the project
        entry: bash -c 'cargo nextest run --all-features -- --include-ignored'
        language: system
        files: \.rs$
        pass_filenames: false
        stages: [manual]
      - id: check-agent-sync
        name: check agent sync
        description: Ensure AGENTS.md stays in sync with CLAUDE.md
        entry: bash -c 'make check-agent-sync'
        language: system
        files: (CLAUDE\.md|AGENTS\.md)$
        pass_filenames: false
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        args: ["protect", "--staged", "--verbose"]
        stages: [pre-commit]
